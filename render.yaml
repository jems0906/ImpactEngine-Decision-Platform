databases:
  - name: impactengine-db
    databaseName: impactengine
    user: impactengine
    plan: free

services:
  - type: web
    name: impactengine-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: impactengine-db
          property: connectionString
      - key: CORS_ORIGINS
        value: https://impactengine-frontend.onrender.com

  - type: web
    name: impactengine-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    plan: free
    envVars:
      - key: VITE_API_BASE_URL
        value: https://impactengine-backend.onrender.com
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
